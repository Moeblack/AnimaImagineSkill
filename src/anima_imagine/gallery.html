<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AnimaImagine Gallery</title>
<link rel="stylesheet" href="/static/css/gallery.css">
</head>
<body>

<!-- ============================================================
     选择模式工具栏（Phase 4: 批量操作时替代 header）
     ============================================================ -->
<div class="select-toolbar" id="selectToolbar">
  <button class="sel-close" id="selClose">✕</button>
  <span class="sel-count" id="selCount">已选 0 张</span>
  <button id="selAll">全选</button>
  <button id="selDownload">⬇ 下载</button>
  <button id="selCopy">📋 复制</button>
  <button id="selDelete">🗑 删除</button>
</div>

<!-- ============================================================
     顶部导航
     ============================================================ -->
<div class="header">
  <h1>✨ AnimaImagine Gallery</h1>
  <button class="toggle-generator" id="toggleGenerator">生图面板</button>
  <button class="toggle-generator" id="enterSelectMode">☑ 选择</button>
  <select id="datePicker">
    <option value="">全部日期</option>
  </select>
  <input id="tagFilter" type="text" placeholder="输入标签过滤..." />
  <select id="promptHistory"><option value="">📜 历史记录</option></select>
  <span class="stats" id="stats"></span>
</div>

<!-- ============================================================
     生图面板
     ============================================================ -->
<div class="generator-panel" id="generatorPanel" style="display: none;">
  <div class="tabs">
    <button id="tabBasic" class="active">基础模式</button>
    <button id="tabAdvanced">高级模式</button>
    <div style="margin-left: 12px; font-size: 12px; color: #a78bfa;">导入 JSON: </div>
    <input type="file" id="jsonUpload" accept=".json" style="width: auto; background: transparent; border: none; padding: 0;" />
  </div>

  <!-- 基础模式 -->
  <div id="modeBasic" class="row">
    <div class="col">
      <textarea id="basicPrompt" placeholder="Prompt..." rows="3"></textarea>
    </div>
  </div>

  <!-- 高级模式 -->
  <div id="modeAdvanced" class="row" style="display: none;">
    <div class="col">
      <input id="advQuality" placeholder="quality_meta_year_safe" value="masterpiece, best quality, newest, year 2025, safe" />
      <input id="advCount" placeholder="count (e.g. 1girl)" value="1girl" />
      <input id="advCharacter" placeholder="character" />
      <input id="advSeries" placeholder="series" />
    </div>
    <div class="col">
      <input id="advAppearance" placeholder="appearance" />
      <input id="advArtist" placeholder="artist" />
      <input id="advStyle" placeholder="style" />
      <input id="advTags" placeholder="tags" />
    </div>
    <div class="col">
      <input id="advNltags" placeholder="nltags" />
      <input id="advEnvironment" placeholder="environment" />
    </div>
  </div>

  <!-- Negative Prompt -->
  <div class="row">
    <div class="col">
      <textarea id="negPrompt" placeholder="Negative Prompt..." rows="2">worst quality, low quality, score_1, score_2, score_3, blurry, jpeg artifacts, sepia, bad hands, bad anatomy, extra fingers, missing fingers, anatomical nonsense</textarea>
    </div>
  </div>

  <!-- ============================================================
       分辨率选择：Aspect Ratio × Megapixels（Phase 2.1）
       ============================================================ -->
  <div style="display: flex; flex-direction: column; gap: 8px;">
    <div style="font-size: 12px; color: #888;">比例:</div>
    <div class="ratio-group">
      <button class="ratio-btn" data-ratio="1:1">1:1</button>
      <button class="ratio-btn active" data-ratio="3:4">3:4</button>
      <button class="ratio-btn" data-ratio="4:3">4:3</button>
      <button class="ratio-btn" data-ratio="2:3">2:3</button>
      <button class="ratio-btn" data-ratio="3:2">3:2</button>
      <button class="ratio-btn" data-ratio="9:16">9:16</button>
      <button class="ratio-btn" data-ratio="16:9">16:9</button>
      <button class="ratio-btn" data-ratio="4:5">4:5</button>
      <button class="ratio-btn" data-ratio="5:4">5:4</button>
    </div>
    <div style="font-size: 12px; color: #888;">像素量 (MP):</div>
    <div class="mp-group">
      <button class="mp-btn active" data-mp="1.0">1.0</button>
      <button class="mp-btn" data-mp="1.5">1.5</button>
      <button class="mp-btn" data-mp="2.0">2.0</button>
      <input type="number" id="mpInput" class="mp-input" value="1.0" min="0.5" max="4.0" step="0.1" />
      <span style="font-size: 12px; color: #888;">MP</span>
    </div>
    <div id="resolutionDisplay" class="resolution-display"></div>
  </div>

  <!-- 参数控件（Phase 2.1: 滑块化） -->
  <div class="common-params">
    <div class="seed-group">
      <label style="font-size: 12px;">Seed:</label>
      <input type="number" id="paramSeed" value="-1" style="width: 100px;" />
      <button class="seed-btn" id="seedRandom" title="随机">🎲</button>
    </div>
    <div class="param-slider">
      <label>Steps</label>
      <input type="range" id="stepsSlider" min="5" max="50" value="20" />
      <span class="value-display" id="stepsValue">20</span>
      <input type="hidden" id="paramSteps" value="20" />
    </div>
    <div class="param-slider">
      <label>CFG</label>
      <input type="range" id="cfgSlider" min="1" max="15" step="0.5" value="4.5" />
      <span class="value-display" id="cfgValue">4.5</span>
      <input type="hidden" id="paramCfg" value="4.5" />
    </div>
  </div>

  <!-- 隐藏的 width/height（由 Ratio×MP 自动计算填充） -->
  <input type="hidden" id="paramWidth" value="0" />
  <input type="hidden" id="paramHeight" value="0" />

  <div style="display: flex; gap: 16px; align-items: center;">
    <button id="generateBtn">生成图片</button>
    <div id="genStatus" style="font-size: 13px; color: #a78bfa;"></div>
  </div>
</div>

<!-- ============================================================
     画廊瀑布流
     ============================================================ -->
<div class="masonry" id="gallery"></div>

<!-- ============================================================
     Lightbox（Phase 3.2: 完整重构）
     ============================================================ -->
<div class="lightbox" id="lightbox">
  <!-- 顶部工具栏 -->
  <div class="lightbox-toolbar">
    <button class="lb-btn lb-close" id="lbClose" title="关闭 (Esc)">✕</button>
    <button class="lb-btn" id="lbDownload" title="下载 (D)">⬇</button>
    <button class="lb-btn" id="lbCopy" title="复制 Prompt (C)">📋</button>
    <button class="lb-btn" id="lbFill" title="回填参数 (R)">🔄</button>
    <button class="lb-btn" id="lbFav" title="收藏 (F)">☆</button>
    <button class="lb-btn" id="lbDelete" title="删除 (Del)">🗑</button>
    <button class="lb-btn" id="lbToggleMeta" title="元数据 (I)">ℹ</button>
  </div>

  <!-- 导航箭头 -->
  <button class="lb-nav lb-prev" id="lbPrev">‹</button>
  <button class="lb-nav lb-next" id="lbNext">›</button>

  <!-- 主图 -->
  <img id="lightboxImg" src="" alt="full" />

  <!-- 底部元数据面板 -->
  <div class="lb-meta" id="lbMeta">
    <div class="lb-prompt" id="lbPrompt"></div>
    <div class="lb-params" id="lbParams"></div>
    <div class="lb-thumbstrip" id="lbThumbstrip"></div>
  </div>
</div>

<!-- JS 模块入口 -->
<script type="module" src="/static/js/app.js"></script>
</body>
</html>
